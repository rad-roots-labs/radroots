[package]
name = "radroots_protected_store"
publish = ["crates-io"]
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Protected local-record envelopes and file-backed key sources"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_protected_store"
readme = "README"

[features]
default = []
std = ["radroots_secret_vault/std"]

[dependencies]
chacha20poly1305 = { workspace = true }
getrandom = { workspace = true }
radroots_secret_vault = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
