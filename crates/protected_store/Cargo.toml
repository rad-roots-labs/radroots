[package]
name = "radroots_protected_store"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "Authenticated store envelopes for protected local records"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_protected_store"
readme = "README"

[features]
default = []
std = ["radroots_secret_vault/std"]

[dependencies]
chacha20poly1305 = { workspace = true }
getrandom = { workspace = true }
radroots_secret_vault = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
zeroize = { workspace = true }
