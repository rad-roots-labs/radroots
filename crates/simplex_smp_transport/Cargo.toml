[package]
name = "radroots_simplex_smp_transport"
publish = false
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "simplex messaging transport framing and handshake policy for the radroots sdk"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_simplex_smp_transport"
readme.workspace = true

[features]
default = ["std"]
std = [
  "base64/std",
  "radroots_simplex_smp_crypto/std",
  "radroots_simplex_smp_proto/std",
  "rustls/std",
  "sha2/std",
  "x509-parser/verify",
]

[dependencies]
base64 = { workspace = true }
radroots_simplex_smp_crypto = { workspace = true, default-features = false }
radroots_simplex_smp_proto = { workspace = true, default-features = false }
rustls = { workspace = true, default-features = false }
sha2 = { workspace = true, default-features = false }
x509-parser = { workspace = true, default-features = false }

[dev-dependencies]
rcgen = { version = "0.14" }
