[package]
name = "radroots-replica-db"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = ["triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr"]
rust-version.workspace = true
license.workspace = true
description = "replica sql runtime and migration interfaces for radroots data layers"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots-replica-db"
readme.workspace = true

[lib]
crate-type = ["rlib"]

[features]
default = []
web = ["radroots-sql-core/web"]
native = ["radroots-sql-core/native"]
embedded = ["radroots-sql-core/embedded"]
coverage-minimal = []

[dependencies]
radroots-sql-core = { workspace = true }
radroots-replica-db-schema = { workspace = true }
radroots-types = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }

[dev-dependencies]
radroots-sql-core = { workspace = true, features = ["native"] }
