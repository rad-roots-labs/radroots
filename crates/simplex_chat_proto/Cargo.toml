[package]
name = "radroots_simplex_chat_proto"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "simplex chat protocol primitives for the radroots sdk"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_simplex_chat_proto"
readme.workspace = true

[features]
default = ["std"]
std = ["serde/std", "serde_json/std", "dep:zstd"]

[dependencies]
base64 = { version = "0.22", default-features = false, features = ["alloc"] }
serde = { workspace = true, default-features = false, features = ["alloc", "derive"] }
serde_json = { workspace = true, default-features = false, features = ["alloc"] }
zstd = { workspace = true, optional = true }
