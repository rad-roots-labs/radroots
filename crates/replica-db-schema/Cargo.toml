[package]
name = "radroots-replica-db-schema"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = ["triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr"]
rust-version.workspace = true
license.workspace = true
description = "replica schema models and relational interfaces for radroots data layers"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots-replica-db-schema"
readme.workspace = true
build = "build.rs"

[lib]
crate-type = ["rlib"]

[features]
default = []
ts-rs = ["dep:ts-rs"]

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
ts-rs = { workspace = true, optional = true }
radroots-types = { workspace = true }
