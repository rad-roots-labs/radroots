[package]
name = "radroots-simplex-agent-store"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "simplex agent persistence and queue state for the radroots sdk"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots-simplex-agent-store"
readme.workspace = true

[features]
default = ["std"]
std = [
  "radroots-simplex-agent-proto/std",
  "radroots-simplex-smp-crypto/std",
  "radroots-simplex-smp-proto/std",
  "serde/std",
  "serde_json/std",
  "sha2/std",
]

[dependencies]
radroots-simplex-agent-proto = { workspace = true, default-features = false }
radroots-simplex-smp-crypto = { workspace = true, default-features = false }
radroots-simplex-smp-proto = { workspace = true, default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true, default-features = false }

[dev-dependencies]
tempfile = { workspace = true }
