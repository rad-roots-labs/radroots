[package]
name = "radroots_replica_sync"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "replica event ingest and synchronization interfaces for radroots data layers"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_replica_sync"
readme.workspace = true

[lib]
crate-type = ["rlib"]

[features]
default = ["std"]
std = [
  "radroots_events/std",
  "radroots_events_codec/std",
  "dep:base64",
  "dep:uuid",
]

[dependencies]
radroots_events = { workspace = true, default-features = false, features = [
  "serde",
] }
radroots_events_codec = { workspace = true, default-features = false, features = [
  "serde_json",
] }
radroots_sql_core = { workspace = true }
radroots_replica_db_schema = { workspace = true }
radroots_replica_db = { workspace = true }
radroots_types = { workspace = true }
hex = { workspace = true }
serde = { workspace = true, default-features = false, features = [
  "alloc",
  "derive",
] }
serde_json = { workspace = true, default-features = false, features = [
  "alloc",
] }
sha2 = { workspace = true, default-features = false }
base64 = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }

[dev-dependencies]
radroots_sql_core = { workspace = true, features = ["native"] }
radroots_replica_db = { workspace = true }
serde_json = { workspace = true }
