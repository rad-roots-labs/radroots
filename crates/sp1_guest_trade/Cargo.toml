[package]
name = "radroots_sp1_guest_trade"
publish = false
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Deterministic Radroots trade public-values reducer for SP1 guests"
repository.workspace = true
homepage.workspace = true

[[bin]]
name = "radroots_sp1_trade_order_acceptance_guest"
path = "src/bin/order_acceptance_guest.rs"
required-features = ["sp1_guest"]

[features]
default = []
sp1_guest = ["dep:sp1-zkvm"]

[dependencies]
serde = { workspace = true, default-features = false, features = ["alloc", "derive"] }
serde_json = { workspace = true, default-features = false, features = ["alloc"] }
sha2 = { workspace = true, default-features = false }
sp1-zkvm = { workspace = true, optional = true }
thiserror = { workspace = true }
