[package]
name = "radroots-sql-core"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "sql execution and migration primitives for radroots data layers"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots-sql-core"
readme.workspace = true

[lib]
crate-type = ["rlib"]

[features]
web = []
bridge = [
  "web",
  "dep:radroots-sql-wasm-bridge",
  "dep:serde-wasm-bindgen",
  "dep:wasm-bindgen",
]
native = ["dep:rusqlite"]
embedded = []

[dependencies]
serde_json = { workspace = true }
thiserror = { workspace = true }
radroots-sql-wasm-bridge = { workspace = true, optional = true }
wasm-bindgen = { workspace = true, optional = true }
serde-wasm-bindgen = { workspace = true, optional = true }
rusqlite = { workspace = true, features = ["bundled"], optional = true }
chrono = { workspace = true }
serde = { workspace = true }
uuid = { workspace = true }
