[package]
name = "radroots_runtime"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "Runtime configuration, secret-file, and service helpers"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_runtime"
readme = "README"

[features]
default = []
cli = ["dep:clap"]

[dependencies]
anyhow = { workspace = true }
chacha20poly1305 = { workspace = true }
clap = { workspace = true, features = ["derive", "env"], optional = true }
config = { workspace = true }
getrandom = { workspace = true }
radroots_log = { workspace = true, features = ["std"] }
radroots_protected_store = { workspace = true, features = ["std"] }
radroots_runtime_paths = { workspace = true }
radroots_secret_vault = { workspace = true, features = ["std"] }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal"] }
toml = { workspace = true }
tracing = { workspace = true }
zeroize = { workspace = true }
