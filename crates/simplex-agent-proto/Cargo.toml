[package]
name = "radroots-simplex-agent-proto"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "simplex agent protocol envelopes and queue lifecycle types for the radroots sdk"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots-simplex-agent-proto"
readme.workspace = true

[features]
default = ["std"]
std = ["radroots-simplex-smp-crypto/std", "radroots-simplex-smp-proto/std"]

[dependencies]
radroots-simplex-smp-crypto = { workspace = true, default-features = false }
radroots-simplex-smp-proto = { workspace = true, default-features = false }
