[package]
name = "radroots_simplex_agent_proto"
publish = false
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "SimpleX agent envelopes, queue models, and codecs"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_simplex_agent_proto"
readme = "README"

[features]
default = ["std"]
std = ["radroots_simplex_smp_crypto/std", "radroots_simplex_smp_proto/std"]

[dependencies]
radroots_simplex_smp_crypto = { workspace = true, default-features = false }
radroots_simplex_smp_proto = { workspace = true, default-features = false }
