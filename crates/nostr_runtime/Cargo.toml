[package]
name = "radroots_nostr_runtime"
version = "0.1.0-alpha.1"
edition.workspace = true
authors = [
  "triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr",
]
rust-version.workspace = true
license.workspace = true
description = "Nostr runtime coordination, subscriptions, and snapshots"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_nostr_runtime"
readme = "README"

[features]
default = ["std", "nostr-client", "rt"]
std = []
rt = ["std", "dep:futures", "dep:tokio"]
nostr-client = ["std", "dep:radroots_nostr"]
nostr-ndb = ["nostr-client"]

[dependencies]
radroots_nostr = { workspace = true, optional = true, default-features = true, features = [
  "client",
] }
futures = { workspace = true, optional = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true, features = ["rt", "sync", "time"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }
