[package]
name = "radroots_runtime_manager"
publish = ["crates-io"]
version = "0.1.0-alpha.2"
edition.workspace = true
authors = ["Tyson Lupul <tyson@radroots.org>"]
rust-version.workspace = true
license.workspace = true
description = "Managed runtime registry and path helpers"
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/radroots_runtime_manager"
readme = "README"

[dependencies]
flate2 = { workspace = true }
radroots_runtime_paths = { workspace = true }
serde = { workspace = true, features = ["derive"] }
tar = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
