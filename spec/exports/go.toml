[language]
id = "go"
repository = "sdk-go"

[packages]
"radroots_core" = "github.com/rad-roots-labs/sdk-go"
"radroots_events" = "github.com/rad-roots-labs/sdk-go"
"radroots_trade" = "github.com/rad-roots-labs/sdk-go"
"radroots_identity" = "github.com/rad-roots-labs/sdk-go"

[artifacts]
models_dir = "internal/generated"
constants_dir = "internal/generated"
manifest_file = "export-manifest.json"

[runtime]
networking = "native"
signing = "native"
deterministic_codec = "native_or_wasm"
